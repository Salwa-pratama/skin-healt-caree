version: "3.9"

services:
  backend:
    build: ../backend
    container_name: etaqwa-backend
    ports:
      - "5000:5000"
    volumes:
      - ../backend:/app
    env_file:
      - ../backend/.env
    restart: unless-stopped

  frontend:
    build: ../frontend
    container_name: etaqwa-frontend
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
    env_file:
      - ../backend/.env
    depends_on:
      - backend
